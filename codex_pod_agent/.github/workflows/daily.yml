name: Daily Podcast Build

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex_pod_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Configure env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "DRY_RUN=false" >> .env
          echo "TTS_PROVIDER=openai" >> .env
      - name: Build
        run: make build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: codex_pod_agent/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  s3:
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: codex_pod_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      - name: Install AWS CLI
        run: |
          sudo apt-get update && sudo apt-get install -y awscli
      - name: Sync to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ secrets.S3_PREFIX || '' }}
        run: |
          DEST="s3://${S3_BUCKET}/${S3_PREFIX}"
          aws s3 sync dist/ "$DEST" --delete --acl public-read --cache-control max-age=3600
